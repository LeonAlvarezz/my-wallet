<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="My Wallet" />
    <meta
      name="description"
      content="Track spending, monitor cash flow, and manage your personal finances with My Wallet."
    />
    <meta property="og:site_name" content="My Wallet" />
    <meta property="og:title" content="My Wallet" />
    <meta
      property="og:description"
      content="Track spending, monitor cash flow, and manage your personal finances with My Wallet."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="My Wallet" />
    <meta
      name="twitter:description"
      content="Track spending, monitor cash flow, and manage your personal finances with My Wallet."
    />
    <script>
      try {
        const storageKey = "vite-ui-theme";
        const storedTheme = localStorage.getItem(storageKey);
        const theme =
          storedTheme === "light" ||
          storedTheme === "dark" ||
          storedTheme === "system"
            ? storedTheme
            : "dark";
        const root = document.documentElement;
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)")
          .matches
          ? "dark"
          : "light";
        const resolvedTheme = theme === "system" ? systemTheme : theme;

        root.classList.remove("light", "dark");
        root.classList.add(resolvedTheme);
      } catch {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      />
    </noscript>
    <link href="/src/styles/global.css" rel="stylesheet" />
    <title>My Wallet</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
