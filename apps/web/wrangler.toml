name = "my-wallet-web"
main = "./worker/index.ts"
compatibility_date = "2026-03-20"

[build]
command = "bun run build"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Set `VITE_API_URL=/api` at build time and configure `API_BASE_URL`
# in your Cloudflare Worker environment to proxy API requests.
